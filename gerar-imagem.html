<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1080px; background: #0A0A0F; display: flex; align-items: center; justify-content: center; font-family: system-ui, sans-serif; }
.card { width: 1080px; height: 1080px; background: #0A0A0F; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px; position: relative; overflow: hidden; }
.glow { position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(200,250,95,0.06) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); }
.badge { background: rgba(200,250,95,0.1); border: 1px solid rgba(200,250,95,0.3); color: #C8FA5F; padding: 8px 24px; border-radius: 100px; font-size: 14px; font-weight: 600; letter-spacing: 2px; margin-bottom: 40px; }
.logo { font-size: 100px; font-weight: 800; color: #F0EEE8; letter-spacing: -4px; margin-bottom: 10px; }
.logo span { color: #C8FA5F; }
.divider { width: 100%; height: 1px; background: #1E1E2E; margin-bottom: 40px; }
.headline { font-size: 52px; font-weight: 800; color: #F0EEE8; letter-spacing: -2px; text-align: center; margin-bottom: 10px; }
.accent { color: #C8FA5F; font-size: 68px; }
.sub { font-size: 20px; color: #7A7A8A; text-align: center; margin-bottom: 50px; line-height: 1.6; }
.features { display: flex; gap: 16px; margin-bottom: 50px; }
.feat { background: #13131A; border: 1px solid #1E1E2E; border-radius: 12px; padding: 20px 28px; text-align: center; }
.feat-label { font-size: 11px; font-weight: 700; color: #C8FA5F; letter-spacing: 1px; margin-bottom: 6px; }
.feat-val { font-size: 15px; font-weight: 700; color: #F0EEE8; }
.cta { background: #C8FA5F; color: #0A0A0F; padding: 24px 80px; border-radius: 100px; font-size: 24px; font-weight: 800; margin-bottom: 24px; }
.url { font-size: 16px; color: #444; }
</style>
</head>
<body>
<div class="card">
  <div class="glow"></div>
  <div class="badge">FERRAMENTA COM IA</div>
  <div class="logo">Vaga<span>.ai</span></div>
  <div class="divider"></div>
  <div class="headline">Seu curriculo em</div>
  <div class="headline accent">45 segundos.</div>
  <div class="sub">Descreve sua experiencia do jeito que vier.<br>A IA transforma em curriculo profissional otimizado para ATS.</div>
  <div class="features">
    <div class="feat"><div class="feat-label">CURRICULO</div><div class="feat-val">Gerado com IA</div></div>
    <div class="feat"><div class="feat-label">CHAT IA</div><div class="feat-val">Carreira 24/7</div></div>
    <div class="feat"><div class="feat-label">PDF</div><div class="feat-val">Pronto em 45s</div></div>
  </div>
  <div class="cta">Acesso por apenas R$15</div>
  <div class="url">vaga-ai-orcin.vercel.app</div>
</div>
</body>
</html>
